<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="format-detection" content="telephone=no" />

<meta property="og:type" content="website" />
<meta property="og:title" content="TWS RPS 취향표" />
<meta property="og:image" content="https://shinanddo.github.io/rpschart/preview.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:url" content="https://shinanddo.github.io/rpschart/" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="TWS RPS 취향표" />
<meta name="twitter:image" content="https://shinanddo.github.io/rpschart/preview.png" />
<meta name="twitter:site" content="@shinanddo" />

<title>TWS RPS 취향표 | @shinanddo</title>

<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />


<style>
  :root{
    --ink:#37352F;
    --muted:#B8B8B4;
    --bg:#FFFFFF;
    --head:#FAFAFA;
    --head-line:#C0C0C0;
    --line:#C0C0C0;

    --cell-w:94px;
    --cell-h:60px;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
  }

  body{
    font-family:'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background:var(--bg);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:42px 16px 56px;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:geometricPrecision;
  }

  .stage{
    overflow:hidden;
  }

  .card{
    background:#ffffff;
    padding:38px;
    border:none;
    border-radius:0;
    box-shadow:none;
    width:max-content;
    transform-origin:top left;
  }

  .sheet{
    width:max-content;
    margin:0 auto;
  }

  .header{
    position:relative;
    width:100%;
    margin:14px 0 20px;
    text-align:center;
  }

  .title{
    font-size:23px;
    line-height:1.1;
    font-weight:800;
    letter-spacing:-.04em;
    color:#37352F;
  }

  .credit{
    position:absolute;
    right:1px;
    top:50%;
    transform:translateY(calc(-50% + 2px));
    margin:0;
    font-size:10.5px;
    color:#DCDCD8;
    font-weight:500;
    letter-spacing:-.03em;
    white-space:nowrap;
  }

  .table-wrap{
    display:block;
    width:fit-content;
    margin:0 auto;
    padding:1px;
    background:#DADDE1;
    border:none;
    box-shadow:none;
    line-height:0;
  }

  table{
    border-collapse:collapse;
    border-spacing:0;
    margin:0;
    background:#ffffff;
  }

  th,td{
    width:var(--cell-w);
    height:var(--cell-h);
    text-align:center;
    vertical-align:middle;
    font-size:15.5px;
    font-weight:600;
    color:var(--ink);
    padding:0;
  }

  thead th,
  tbody th{
    background:var(--head);
    color:#37352F;
    font-weight:700;
    border-right:1px solid var(--head-line);
    border-bottom:1px solid var(--head-line);
  }

  td{
    background:#ffffff;
    border-right:1px solid var(--line);
    border-bottom:1px solid var(--line);
  }

  tr th:last-child,
  tr td:last-child{
    border-right:none;
  }

  tbody tr:last-child th,
  tbody tr:last-child td{
    border-bottom:none;
  }

  td.cell{
    cursor:pointer;
    transition:background .12s ease;
  }

  td.cell:hover{
    background:#F7F7F5;
  }

  td.self{
    cursor:default;
    background:#ffffff;
  }

  .chip{
    display:inline-block;
    min-width:42px;
    padding:7px 11px;
    line-height:1;
    border-radius:0;
  }

  .legend{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px 18px;
    width:100%;
    margin:20px 0 0;
    font-size:12.7px;
  }

  .legend .item{
    display:flex;
    align-items:center;
    gap:6px;
    color:#37352F;
    font-weight:620;
    line-height:1;
  }

  .legend .dot{
    width:15px;
    height:15px;
    border-radius:50%;
    display:inline-block;
    flex:none;
  }

  .controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:26px;
  }

  button.btn{
    font-family:inherit;
    font-size:14px;
    font-weight:700;
    border-radius:8px;
    padding:11px 22px;
    cursor:pointer;
  }

  .btn-primary{
    background:#37352F;
    color:#ffffff;
    border:1px solid #37352F;
  }

  .btn-primary:hover{
    background:#24231F;
  }

  .btn-ghost{
    background:#ffffff;
    color:#37352F;
    border:1px solid #D8D8D5;
  }

  .btn-ghost:hover{
    background:#F7F7F5;
  }

  .pop{
    position:fixed;
    z-index:50;
    background:#fff;
    border:1px solid #C0C0C0;
    border-radius:10px;
    padding:10px;
    display:none;
    box-shadow:0 8px 22px rgba(0,0,0,.08);
  }

  .pop.open{
    display:block;
  }

  .pop .opts{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }

  .pop .opt{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
    border:none;
    background:transparent;
    cursor:pointer;
    padding:6px 8px;
    border-radius:8px;
    font-family:inherit;
  }

  .pop .opt:hover{
    background:#F7F7F5;
  }

  .pop .sw{
    width:24px;
    height:24px;
    border-radius:50%;
  }

  .pop .opt span{
    font-size:12px;
    color:#37352F;
    font-weight:620;
  }


  button,
  .cell,
  .opt{
    -webkit-tap-highlight-color:transparent;
  }

  button:disabled{
    cursor:default;
    opacity:.72;
  }

  @media (max-width:560px){
    body{
      padding:22px 10px 32px;
    }

    .card{
      padding:32px;
    }
  }
</style>

</head>

<body>
  <div class="stage" id="stage">
    <div class="card" id="capture">
      <div class="sheet">
        <div class="header">
          <div class="title">TWS RPS 취향표</div>
        </div>

        <div class="table-wrap">
          <table id="chart"></table>
        </div>

        <div class="legend" id="legend"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button type="button" class="btn btn-primary" id="saveBtn">이미지 저장</button>
    <button type="button" class="btn btn-ghost" id="resetBtn">초기화</button>
  </div>

  <div class="pop" id="pop">
    <div class="opts" id="popOpts"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    const members = ['신유','도훈','영재','한진','지훈','경민'];

    const cells = [
      ['',     '닏도','닏재','닏한','닏훈','닏경'],
      ['도닏','',     '돟재','돟한','돟햎','돟탱'],
      ['재닏','재돟','',     '재쩐','영햎','영밐'],
      ['한닏','한돟','핝재','',     '한햎','핝갱'],
      ['햎닏','햎도','햎재','훈쩐','',     '훈갱'],
      ['경닏','경돟','경째','경쩐','경햎','']
    ];

    const cats = [
      { key:'otp',      label:'OTP',      rgb:'255,189,189', op:.95, dot:'rgba(255,189,189,.90)' },
      { key:'good',     label:'좋음',     rgb:'255,224,184', op:.95, dot:'rgba(255,224,184,.90)' },
      { key:'like',     label:'호감',     rgb:'255,255,171', op:.75, dot:'rgba(255,255,171,.68)' },
      { key:'interest', label:'가능',     rgb:'194,255,238', op:.85, dot:'rgba(194,255,238,.78)' },
      { key:'none',     label:'관심없음', rgb:null,          op:0,   dot:'#ffffff' },
      { key:'mine',     label:'지뢰',     rgb:'90,90,92',    op:.66, dot:'rgba(90,90,92,.66)' }
    ];

    const catMap = Object.fromEntries(cats.map(c => [c.key, c]));
    const fillOf = c => c.rgb ? 'rgba(' + c.rgb + ',' + c.op + ')' : '';

    const legend = document.getElementById('legend');

    legend.innerHTML = cats.map(function(c){
      const border = c.key === 'none' ? '1px solid #cccccc' : '1px solid rgba(0,0,0,.07)';

      return '<div class="item"><span class="dot" style="background:' + c.dot + ';border:' + border + '"></span><span>' + c.label + '</span></div>';
    }).join('');

    const state = {};
    const tbl = document.getElementById('chart');

    function buildTable(){
      let html = '<thead><tr><th class="corner"></th>';

      members.forEach(function(m){
        html += '<th>' + m + '</th>';
      });

      html += '</tr></thead><tbody>';

      for(let r = 0; r < members.length; r++){
        html += '<tr><th>' + members[r] + '</th>';

        for(let c = 0; c < members.length; c++){
          if(r === c){
            html += '<td class="self"></td>';
          }else{
            html += '<td class="cell" data-r="' + r + '" data-c="' + c + '"><span class="chip">' + cells[r][c] + '</span></td>';
          }
        }

        html += '</tr>';
      }

      html += '</tbody>';
      tbl.innerHTML = html;
    }

    buildTable();

    const pop = document.getElementById('pop');
    const popOpts = document.getElementById('popOpts');
    let activeCell = null;

    popOpts.innerHTML = cats.map(function(c){
      const swColor = c.rgb ? 'rgba(' + c.rgb + ',' + Math.min(c.op + 0.18, 0.9) + ')' : '#ffffff';
      const border = c.key === 'none' ? 'border:1px dashed #cccccc;' : 'border:1px solid rgba(0,0,0,.08);';

      return '<button class="opt" data-key="' + c.key + '"><span class="sw" style="background:' + swColor + ';' + border + '"></span><span>' + c.label + '</span></button>';
    }).join('');

    function applyColor(cell, key){
      const cat = catMap[key];
      const id = cell.dataset.r + '-' + cell.dataset.c;

      if(!cat || !cat.rgb){
        cell.style.background = '';
        delete state[id];
      }else{
        cell.style.background = fillOf(cat);
        state[id] = key;
      }
    }

    function openPop(cell){
      activeCell = cell;
      pop.classList.add('open');

      const r = cell.getBoundingClientRect();
      const pw = pop.offsetWidth;
      const ph = pop.offsetHeight;
      const M = 8;

      let left = r.left + r.width / 2 - pw / 2;
      let top = r.bottom + 8;

      left = Math.max(M, Math.min(left, window.innerWidth - pw - M));

      if(top + ph > window.innerHeight - M){
        top = r.top - ph - 8;
      }

      pop.style.left = left + 'px';
      pop.style.top = top + 'px';
    }

    function closePop(){
      pop.classList.remove('open');
      activeCell = null;
    }

    tbl.addEventListener('click', function(e){
      const cell = e.target.closest('td.cell');
      if(!cell) return;

      e.stopPropagation();

      if(activeCell === cell){
        closePop();
        return;
      }

      openPop(cell);
    });

    popOpts.addEventListener('click', function(e){
      const opt = e.target.closest('.opt');
      if(!opt || !activeCell) return;

      applyColor(activeCell, opt.dataset.key);
      closePop();
    });

    document.addEventListener('click', function(e){
      if(pop.classList.contains('open') && !pop.contains(e.target)){
        closePop();
      }
    });

    window.addEventListener('resize', closePop);
    window.addEventListener('scroll', closePop, true);

    document.getElementById('resetBtn').addEventListener('click', function(){
      document.querySelectorAll('td.cell').forEach(function(cell){
        cell.style.background = '';
      });

      for(const k in state){
        delete state[k];
      }

      closePop();
    });

    const stageEl = document.getElementById('stage');

    function relayout(){
      const card = document.getElementById('capture');

      card.style.transform = 'none';

      const w = card.offsetWidth;
      const h = card.offsetHeight;

      if(!w || !h) return;

      const padX = parseFloat(getComputedStyle(document.body).paddingLeft) || 0;
      const avail = document.documentElement.clientWidth - padX * 2;
      const s = avail < w ? avail / w : 1;

      card.style.transform = s < 1 ? 'scale(' + s + ')' : 'none';
      stageEl.style.width = (w * s) + 'px';
      stageEl.style.height = (h * s) + 'px';
    }

    if(document.fonts && document.fonts.ready){
      document.fonts.ready.then(relayout);
    }else{
      relayout();
    }

    relayout();
    window.addEventListener('resize', relayout);

    
    function isIOSWebKit(){
      return /iP(ad|hone|od)/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints >= 5);
    }

    function makeCenteredExportCanvas(contentCanvas, cssMargin, scale){
      const margin = Math.round(cssMargin * scale);
      const out = document.createElement('canvas');

      out.width = contentCanvas.width + margin * 2;
      out.height = contentCanvas.height + margin * 2;

      const ctx = out.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, out.width, out.height);
      ctx.drawImage(contentCanvas, margin, margin);

      return out;
    }

    function canvasToBlob(canvas){
      return new Promise(function(resolve){
        if(canvas.toBlob){
          canvas.toBlob(function(blob){
            resolve(blob);
          }, 'image/png');
        }else{
          resolve(null);
        }
      });
    }

    function writeImageWindow(targetWindow, canvas){
      const dataUrl = canvas.toDataURL('image/png');

      if(targetWindow && !targetWindow.closed){
        targetWindow.document.open();
        targetWindow.document.write('<!doctype html><html lang="ko"><head><meta charset="UTF-8"><title>TWS RPS 취향표 | @shinanddo</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>html,body{margin:0;background:#fff;}body{display:flex;justify-content:center;align-items:flex-start;padding:0;}img{display:block;max-width:100%;height:auto;}</style></head><body><img src="' + dataUrl + '" alt="RPS 취향표"></body></html>');
        targetWindow.document.close();
        return;
      }

      location.href = dataUrl;
    }

    async function triggerDownloadFromCanvas(canvas, preparedWindow){
      const filename = 'RPS_취향표.png';

      /*
        iPhone/iPadOS Safari/Chrome:
        새 창은 클릭 이벤트 안에서 미리 열어두고, 렌더링 완료 후 이미지를 주입합니다.
        이렇게 해야 비동기 처리 후 window.open이 팝업 차단되는 문제를 줄일 수 있습니다.

        Android/PC/Mac:
        Blob PNG를 download 속성으로 저장합니다.
      */
      if(isIOSWebKit()){
        writeImageWindow(preparedWindow, canvas);
        return;
      }

      const blob = await canvasToBlob(canvas);

      if(blob){
        try{
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();

          setTimeout(function(){
            URL.revokeObjectURL(url);
          }, 1500);

          return;
        }catch(e){
          console.warn(e);
        }
      }

      writeImageWindow(null, canvas);
    }

    document.getElementById('saveBtn').addEventListener('click', function(){
      closePop();

      const btn = this;
      const prev = btn.textContent;
      let preparedWindow = null;

      if(typeof html2canvas === 'undefined'){
        alert('이미지 저장 라이브러리를 불러오지 못했어요. 인터넷 연결을 확인한 뒤 다시 시도해 주세요.');
        return;
      }

      if(isIOSWebKit()){
        preparedWindow = window.open('', '_blank');

        if(preparedWindow){
          preparedWindow.document.write('<!doctype html><html lang="ko"><head><meta charset="UTF-8"><title>이미지 생성 중…</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:#37352F;background:#fff;font-size:15px;}</style></head><body>이미지 생성 중…</body></html>');
          preparedWindow.document.close();
        }
      }

      btn.textContent = '저장 중…';
      btn.disabled = true;

      const card = document.getElementById('capture');
      const node = document.querySelector('#capture .sheet');
      const fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
      const scale = Math.min(4, Math.max(2, (window.devicePixelRatio || 1) * 2));
      const exportMargin = window.matchMedia('(max-width:560px)').matches ? 32 : 38;

      function finish(){
        btn.textContent = prev;
        btn.disabled = false;
        relayout();
      }

      fontsReady.then(function(){
        card.style.transform = 'none';

        const w = Math.ceil(node.offsetWidth);
        const h = Math.ceil(node.offsetHeight);

        return html2canvas(node, {
          scale: scale,
          backgroundColor:'#ffffff',
          useCORS:true,
          allowTaint:false,
          logging:false,
          width: w,
          height: h,
          windowWidth: w,
          windowHeight: h,
          scrollX: 0,
          scrollY: 0,
          removeContainer:true
        });
      }).then(function(contentCanvas){
        const centeredCanvas = makeCenteredExportCanvas(contentCanvas, exportMargin, scale);
        return triggerDownloadFromCanvas(centeredCanvas, preparedWindow).then(finish);
      }).catch(function(err){
        console.error(err);

        if(preparedWindow && !preparedWindow.closed){
          preparedWindow.close();
        }

        alert('이미지 저장에 실패했어요: ' + (err && err.message ? err.message : err));
        finish();
      });
    });


  </script>
</body>
</html>
